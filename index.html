<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>James "Joey" Allee — Construction Estimator &amp; Project Manager</title>
  <meta name="description" content="Digital twin of a construction estimating and project management portfolio — every project plotted on an interactive 3D map with a searchable project assistant." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
</head>
<body>

  <!-- Full-viewport map is the base layer; everything else floats above it. -->
  <div id="globe-container"></div>
  <div class="map-scrim" aria-hidden="true"></div>
  <div id="globe-loading" class="globe-loading">Loading globe…</div>
  <div id="hover-tooltip" class="hover-tooltip" hidden></div>

  <div class="identity-badge glass-panel">
    <div class="identity-text">
      <span id="person-name" class="identity-name"></span>
      <span id="person-titles" class="identity-titles"></span>
    </div>
    <a id="linkedin-link" class="btn btn-primary btn-sm" href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
  </div>

  <div class="stats-strip glass-panel" id="stat-row"></div>

  <aside class="search-panel glass-panel" id="search-panel">
    <div class="search-panel-header">
      <div class="search-panel-title">
        <span class="assistant-dot"></span>
        Project Assistant
      </div>
      <button id="search-panel-toggle" class="panel-toggle" aria-label="Collapse panel">&#8250;</button>
    </div>
    <div class="search-panel-body" id="search-panel-body">
      <p class="search-panel-hint">Search by location, employer, year, or budget — e.g. "Louisville over $1M" or "2021 American Roofing".</p>
      <input id="search-input" class="search-input" type="text" placeholder="Search projects…" autocomplete="off" />
      <p id="search-summary" class="search-summary"></p>
      <div id="project-list" class="project-list"></div>
    </div>
  </aside>

  <button id="search-panel-reopen" class="panel-reopen glass-panel" hidden aria-label="Open project assistant">
    <span class="assistant-dot"></span> Project Assistant
  </button>

  <div id="case-study-overlay" class="overlay" hidden>
    <div class="case-study-panel" role="dialog" aria-modal="true" aria-labelledby="cs-title">
      <button id="cs-close" class="cs-close" aria-label="Close case study">&times;</button>
      <div id="cs-content" class="cs-content"></div>
    </div>
  </div>

  <a class="source-credit" href="https://github.com/allerion-systems/_-JA_PROJECTS-_" target="_blank" rel="noopener noreferrer">Source on GitHub</a>

  <!-- CesiumJS: same engine/CDN pattern as the Allerion-Digital-Twin repo -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>

  <script src="js/data.js"></script>
  <script src="js/globe.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/case-study.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
